apiVersion: v1
kind: ConfigMap
metadata:
  name: align-config
data:
  CORS_ORIGINS: "http://localhost:3000,https://align.example.com"
  NEXT_PUBLIC_API_URL: "https://align.example.com/api/v1"
---
apiVersion: v1
kind: Secret
metadata:
  name: align-secrets
type: Opaque
stringData:
  # Use a networked database (e.g., PostgreSQL) for multi-replica deployments.
  # SQLite is only suitable for single-replica dev/test environments.
  # Example: "postgresql://user:password@db-host:5432/align"
  DATABASE_URL: "sqlite:///./align.db"
  GROK_API_KEY: "change-me"
