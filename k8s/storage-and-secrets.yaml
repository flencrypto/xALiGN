# Horizontal Pod Autoscaler for the API tier
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: align-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: align-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Persistent Volume Claim for shared file storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: align-shared-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
