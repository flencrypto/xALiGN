# ContractGHOST Kubernetes Storage & Secrets Templates

# ── Persistent Volume Claim (uploads) ─────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard   # replace with your storage class (e.g. efs-sc on AWS)
  resources:
    requests:
      storage: 50Gi

---
# ── Secret creation (run these commands, do NOT commit values) ────────────────
# kubectl create secret generic db-secrets \
#   --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/contractghost'
#
# kubectl create secret generic api-secrets \
#   --from-literal=XAI_API_KEY='xai-your-key-here'
#
# Or use a secret manager (AWS Secrets Manager, HashiCorp Vault, Sealed Secrets).
# Never commit plaintext secret values to source control.

---
# ── Horizontal Pod Autoscaler (API) ──────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: contractghost-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: contractghost-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
