apiVersion: apps/v1
kind: Deployment
metadata:
  name: align-api
  labels:
    app: align
    tier: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: align
      tier: api
  template:
    metadata:
      labels:
        app: align
        tier: api
    spec:
      containers:
        - name: api
          image: align-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: DATABASE_URL
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: GROK_API_KEY
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: align-config
                  key: CORS_ORIGINS
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
