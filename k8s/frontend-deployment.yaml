apiVersion: apps/v1
kind: Deployment
metadata:
  name: align-frontend
  labels:
    app: align
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: align
      tier: frontend
  template:
    metadata:
      labels:
        app: align
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: align-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: align-config
                  key: NEXT_PUBLIC_API_URL
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: align-frontend-svc
  labels:
    app: align
    tier: frontend
spec:
  selector:
    app: align
    tier: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP
