apiVersion: apps/v1
kind: Deployment
metadata:
  name: align-backend
  labels:
    app: align
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: align
      tier: backend
  template:
    metadata:
      labels:
        app: align
        tier: backend
    spec:
      containers:
        - name: backend
          image: align-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: DATABASE_URL
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: GROK_API_KEY
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: align-config
                  key: CORS_ORIGINS
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: align-backend-svc
  labels:
    app: align
    tier: backend
spec:
  selector:
    app: align
    tier: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
