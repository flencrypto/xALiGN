apiVersion: apps/v1
kind: Deployment
metadata:
  name: align-backend
  labels:
    app: align
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: align
      tier: backend
  template:
    metadata:
      labels:
        app: align
        tier: backend
    spec:
      containers:
        - name: backend
          image: align-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: DATABASE_URL
            - name: GROK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: align-secrets
                  key: GROK_API_KEY
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: align-config
                  key: CORS_ORIGINS
            - name: ENABLE_SCHEDULER
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: shared-storage
              mountPath: /app/uploads
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: align-shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: align-backend-svc
  labels:
    app: align
    tier: backend
spec:
  selector:
    app: align
    tier: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
