# ─────────────────────────────────────────────────────────────────────────────
# aLiGN – Netlify configuration
#
# Deploys the Next.js 15 frontend from the /frontend subdirectory.
#
# Prerequisites (Netlify Site Settings → Environment Variables):
#   NEXT_PUBLIC_API_URL      → URL of your deployed backend
#                            e.g. https://api.align-dc.com/api/v1
#
# Optional (only if using auth):
#   NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
#   NEXT_PUBLIC_AUTH0_DOMAIN
#   NEXT_PUBLIC_AUTH0_CLIENT_ID
#
# Deploy steps:
# 1. Connect repo to Netlify
# 2. Add the env vars above
# 3. Netlify auto-detects this file
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # The Next.js app lives in the /frontend subdirectory
  base      = "frontend"
  command   = "npm ci && npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION            = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# ── Next.js App Router support ───────────────────────────────────────────────
# Full support for Server Components, Route Handlers, Middleware,
# Image Optimisation and ISR via the official plugin.
# The plugin is pinned as a devDependency in frontend/package.json.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Fetch external feeds (required inputs for netlify-plugin-fetch-feeds) ────
# This plugin is installed via the Netlify UI; required inputs are provided here.
# Update `feeds` with the actual RSS/Atom feed URLs you want to cache.
[[plugins]]
  package = "netlify-plugin-fetch-feeds"
  [plugins.inputs]
    dataDir = "src/_data/feeds"
    feeds   = []

# ── Headers (optional – add any you need) ────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
